<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guild Economic Loop</title>
  <link rel="stylesheet" href="../assets/theme.css" />
  <style>
    body {
      font-family: sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 32px 16px;
      color: var(--text);
    }
    h1 { font-size: 20px; font-weight: 500; color: #2C2C2A; margin-bottom: 8px; }
    p  { font-size: 13px; color: #888780; margin-bottom: 24px; }
    .diagram { width: 100%; max-width: 720px; background: #ffffff; }
    .th      { font-size: 14px; font-weight: 500; fill: #3C3489; }
    .ts      { font-size: 12px; font-weight: 400; fill: #534AB7; }
    .th-teal { font-size: 14px; font-weight: 500; fill: #085041; }
    .ts-teal { font-size: 12px; font-weight: 400; fill: #0F6E56; }
    .th-amber{ font-size: 14px; font-weight: 500; fill: #633806; }
    .ts-amber{ font-size: 12px; font-weight: 400; fill: #854F0B; }
    .th-coral{ font-size: 14px; font-weight: 500; fill: #712B13; }
    .ts-coral{ font-size: 12px; font-weight: 400; fill: #993C1D; }
    .th-gray { font-size: 14px; font-weight: 500; fill: #444441; }
    .th-green{ font-size: 14px; font-weight: 500; fill: #27500A; }
    .ts-green{ font-size: 12px; font-weight: 400; fill: #3B6D11; }
    .th-blue { font-size: 14px; font-weight: 500; fill: #0C447C; }
    .ts-blue { font-size: 12px; font-weight: 400; fill: #185FA5; }
    .label   { font-size: 10px; fill: #888780; letter-spacing: 0.05em; }
    .phase   { font-size: 11px; fill: #888780; opacity: 0.55; }
    .page {
      width: min(860px, calc(100% - 32px));
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 28px;
    }
  </style>
</head>
<body>
  <main class="page">
  <h1>Guild — Economic Loop</h1>
  <p>Full economic simulation — all phases and design decisions captured</p>
  <div class="diagram">
  <svg width="100%" viewBox="0 0 680 1100" xmlns="http://www.w3.org/2000/svg" style="font-family: sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="phase" x="40" y="46">SETUP</text>
  <text class="phase" x="40" y="196">PRODUCTION</text>
  <text class="phase" x="40" y="476">TRADE</text>
  <text class="phase" x="40" y="736">FINANCES</text>
  <text class="phase" x="40" y="936">GROWTH</text>

  <!-- ─── SETUP ─── -->
  <rect x="220" y="30" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central">Choose a trade</text>
  <text class="ts" x="340" y="70" text-anchor="middle" dominant-baseline="central">Blacksmith, baker, merchant…</text>

  <rect x="220" y="110" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="132" text-anchor="middle" dominant-baseline="central">Establish workshop</text>
  <text class="ts" x="340" y="150" text-anchor="middle" dominant-baseline="central">Buy building, pay setup costs</text>

  <line x1="340" y1="86" x2="340" y2="110" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ─── PRODUCTION ─── -->
  <rect x="60" y="180" width="220" height="70" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-teal" x="170" y="202" text-anchor="middle" dominant-baseline="central">Gather resources</text>
  <text class="ts-teal" x="170" y="220" text-anchor="middle" dominant-baseline="central">Extraction buildings, nature</text>
  <text class="ts-teal" x="170" y="236" text-anchor="middle" dominant-baseline="central">spots, or buy from market</text>

  <rect x="400" y="180" width="220" height="70" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-teal" x="510" y="202" text-anchor="middle" dominant-baseline="central">Hire employees</text>
  <text class="ts-teal" x="510" y="220" text-anchor="middle" dominant-baseline="central">From town NPC pool</text>
  <text class="ts-teal" x="510" y="236" text-anchor="middle" dominant-baseline="central">Wage by skill, headcount limit</text>

  <path d="M260 176 L170 180" fill="none" stroke="#444441" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <path d="M420 176 L510 180" fill="none" stroke="#444441" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

  <rect x="200" y="290" width="280" height="70" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-teal" x="340" y="312" text-anchor="middle" dominant-baseline="central">Craft / produce goods</text>
  <text class="ts-teal" x="340" y="330" text-anchor="middle" dominant-baseline="central">Fixed recipes, skill reduces time</text>
  <text class="ts-teal" x="340" y="348" text-anchor="middle" dominant-baseline="central">Blocked if ingredients missing</text>

  <path d="M170 250 L260 295" fill="none" stroke="#444441" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>
  <path d="M510 250 L420 295" fill="none" stroke="#444441" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

  <rect x="220" y="400" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-teal" x="340" y="422" text-anchor="middle" dominant-baseline="central">Store in inventory</text>
  <text class="ts-teal" x="340" y="440" text-anchor="middle" dominant-baseline="central">Unlimited warehouse space</text>

  <line x1="340" y1="360" x2="340" y2="400" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ─── TRADE ─── -->
  <rect x="60" y="460" width="220" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th-amber" x="170" y="482" text-anchor="middle" dominant-baseline="central">Deposit to market</text>
  <text class="ts-amber" x="170" y="500" text-anchor="middle" dominant-baseline="central">Player and NPC businesses</text>

  <rect x="400" y="460" width="220" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="th-green" x="510" y="482" text-anchor="middle" dominant-baseline="central">City AI procurement</text>
  <text class="ts-green" x="510" y="500" text-anchor="middle" dominant-baseline="central">Guards, admin, services</text>

  <path d="M300 456 L200 460" fill="none" stroke="#444441" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>
  <path d="M380 456 L480 460" fill="none" stroke="#444441" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

  <rect x="180" y="556" width="320" height="70" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th-amber" x="340" y="578" text-anchor="middle" dominant-baseline="central">City market pool</text>
  <text class="ts-amber" x="340" y="596" text-anchor="middle" dominant-baseline="central">Price always auto — supply &amp; demand</text>
  <text class="ts-amber" x="340" y="614" text-anchor="middle" dominant-baseline="central">NPCs, players, city AI all buy here</text>

  <path d="M170 516 L260 560" fill="none" stroke="#444441" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>
  <path d="M510 516 L420 560" fill="none" stroke="#444441" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

  <rect x="200" y="666" width="280" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="th-green" x="340" y="688" text-anchor="middle" dominant-baseline="central">City AI emergency import</text>
  <text class="ts-green" x="340" y="706" text-anchor="middle" dominant-baseline="central">Stock critical — buys from other towns</text>

  <line x1="340" y1="626" x2="340" y2="666" stroke="#E24B4A" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- ─── FINANCES ─── -->
  <rect x="60" y="720" width="200" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th-coral" x="160" y="742" text-anchor="middle" dominant-baseline="central">Revenue — real time</text>
  <text class="ts-coral" x="160" y="760" text-anchor="middle" dominant-baseline="central">Gold in on each sale</text>

  <rect x="420" y="720" width="200" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th-amber" x="520" y="742" text-anchor="middle" dominant-baseline="central">End of day expenses</text>
  <text class="ts-amber" x="520" y="760" text-anchor="middle" dominant-baseline="central">Wages, upkeep, taxes</text>

  <path d="M340 748 L260 748" fill="none" stroke="#444441" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>
  <path d="M340 748 L420 748" fill="none" stroke="#444441" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

  <rect x="220" y="816" width="240" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th-coral" x="340" y="838" text-anchor="middle" dominant-baseline="central">Net profit / loss</text>
  <text class="ts-coral" x="340" y="856" text-anchor="middle" dominant-baseline="central">Revenue minus all expenses</text>

  <path d="M160 776 L280 816" fill="none" stroke="#444441" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>
  <path d="M520 776 L400 816" fill="none" stroke="#444441" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

  <rect x="60" y="880" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th-blue" x="140" y="902" text-anchor="middle" dominant-baseline="central">City loan</text>
  <text class="ts-blue" x="140" y="920" text-anchor="middle" dominant-baseline="central">Grace period lifeline</text>

  <path d="M300 872 L180 880" fill="none" stroke="#185FA5" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <path d="M140 880 Q40 900 40 748 Q40 722 60 722" fill="none" stroke="#185FA5" stroke-width="1" stroke-dasharray="5 3" opacity="0.35" marker-end="url(#arrow)"/>

  <!-- ─── GROWTH ─── -->
  <rect x="60" y="980" width="120" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th-gray" x="120" y="1002" text-anchor="middle" dominant-baseline="central">Buy building</text>
  <text class="label" x="120" y="1022" text-anchor="middle">Time to build</text>

  <rect x="196" y="980" width="120" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-teal" x="256" y="1002" text-anchor="middle" dominant-baseline="central">Upgrade</text>
  <text class="ts-teal" x="256" y="1020" text-anchor="middle" dominant-baseline="central">Speed, slots, yield</text>

  <rect x="332" y="980" width="120" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-teal" x="392" y="1002" text-anchor="middle" dominant-baseline="central">Hire staff</text>
  <text class="ts-teal" x="392" y="1020" text-anchor="middle" dominant-baseline="central">Fill headcount</text>

  <rect x="468" y="980" width="90" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="513" y="1002" text-anchor="middle" dominant-baseline="central">2nd trade</text>
  <text class="ts" x="513" y="1020" text-anchor="middle" dominant-baseline="central">Time to build</text>

  <rect x="574" y="980" width="86" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="th-green" x="617" y="1002" text-anchor="middle" dominant-baseline="central">Buy mine</text>
  <text class="ts-green" x="617" y="1020" text-anchor="middle" dominant-baseline="central">Time to build</text>

  <path d="M300 872 L120 980" fill="none" stroke="#444441" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <path d="M320 872 L256 980" fill="none" stroke="#444441" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <path d="M340 872 L392 980" fill="none" stroke="#444441" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <path d="M370 872 L513 980" fill="none" stroke="#444441" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <path d="M400 872 L617 980" fill="none" stroke="#444441" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

  <!-- Feedback loop -->
  <path d="M120 1036 Q40 1060 40 210 Q40 190 60 188" fill="none" stroke="#444441" stroke-width="1" stroke-dasharray="5 4" opacity="0.3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="580" y="30" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="label" x="596" y="40">Setup</text>
  <rect x="580" y="48" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="label" x="596" y="58">Production</text>
  <rect x="580" y="66" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="label" x="596" y="76">Trade</text>
  <rect x="580" y="84" width="10" height="10" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="label" x="596" y="94">Finances</text>
  <rect x="580" y="102" width="10" height="10" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="label" x="596" y="112">Growth</text>
  <rect x="580" y="120" width="10" height="10" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="label" x="596" y="130">City loan</text>
  </svg>
  </div>
  </main>
</body>
</html>
