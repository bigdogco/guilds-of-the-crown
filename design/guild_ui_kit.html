  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ar-gradient(90deg, transparent 0 7px, rgba(232,213,164,.04) 7px 8px),\n      radial-gradient(120% 80% at 50% 0%, #3a2616 0%, #1a1108 60%, #0a0604 100%);\n    min-height:100vh;\n  }\n\n  /* ─── layout ─── */\n  .wrap{max-width:1280px;margin:0 auto;padding:48px 32px 96px}\n  .hd-banner{text-align:center;margin-bottom:48px}\n  .hd-banner .super{font-family:'Press Start 2P';font-size:9px;color:var(--brass-br);letter-spacing:.2em;margin-bottom:10px}\n  .hd-banner h1{font-family:'Jacquard 12';font-size:72px;color:var(--parch);margin:0;line-height:.9;\n    text-shadow:3px 3px 0 var(--oxblood-dk), 4px 4px 0 var(--ink)}\n  .hd-banner .sub{font-family:'VT323';font-size:20px;color:var(--parch-dk);margin-top:8px}\n\n  section{margin:64px 0 0}\n  section > .shead{display:flex;align-items:baseline;gap:14px;margin-bottom:20px;padding-bottom:10px;\n    border-bottom:1px dashed rgba(232,213,164,.22)}\n  section > .shead .num{font-family:'Press Start 2P';font-size:11px;color:var(--brass-br);\n    background:var(--ink);padding:6px 8px;\n    box-shadow:inset 0 0 0 1px var(--brass-dk), inset 0 0 0 2px var(--ink)}\n  section > .shead h2{font-family:'Jacquard 12';font-size:40px;margin:0;color:var(--parch);line-height:1}\n  section > .shead .desc{font-family:'VT323';font-size:18px;color:var(--parch-dk);margin-left:auto}\n\n  .row{display:flex;flex-wrap:wrap;gap:48px;align-items:flex-end}\n  .col{display:flex;flex-direction:column;gap:10px}\n  .grid-2{display:grid;grid-template-columns:repeat(2, 1fr);gap:32px}\n  .grid-3{display:grid;grid-template-columns:repeat(3, 1fr);gap:32px}\n\n  .specimen{display:flex;flex-direction:column;gap:8px;align-items:flex-start}\n  .specimen .lbl{font-family:'Press Start 2P';font-size:8px;color:var(--brass-br);letter-spacing:.08em}\n  .specimen .dim{font-family:'VT323';font-size:16px;color:var(--parch-dk);line-height:1.05}\n  .specimen .dim em{font-style:normal;color:var(--parch)}\n\n  /* ─── measurement callout ─── */\n  .meas{position:relative;display:inline-block}\n  .meas[data-w]::before{content:attr(data-w);position:absolute;left:50%;top:-22px;transform:translateX(-50%);\n    font-family:'VT323';font-size:14px;color:var(--measure);\n    background:rgba(10,8,4,.85);padding:1px 6px;border:1px solid var(--measure);\n    white-space:nowrap}\n  .meas[data-h]::after{content:attr(data-h);position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);\n    font-family:'VT323';font-size:14px;color:var(--measure);\n    background:rgba(10,8,4,.85);padding:1px 6px;border:1px solid var(--measure);\n    white-space:nowrap}\n  .meas .tick{position:absolute;background:var(--measure);pointer-events:none}\n  .meas .tick.top{left:0;right:0;top:-6px;height:1px}\n  .meas .tick.top::before,.meas .tick.top::after{content:\"\";position:absolute;width:1px;height:6px;background:var(--measure);top:0}\n  .meas .tick.top::before{left:0}\n  .meas .tick.top::after{right:0}\n  .meas .tick.right{top:0;bottom:0;right:-6px;width:1px}\n  .meas .tick.right::before,.meas .tick.right::after{content:\"\";position:absolute;height:1px;width:6px;background:var(--measure);right:0}\n  .meas .tick.right::before{top:0}\n  .meas .tick.right::after{bottom:0}\n\n  /* ─── primitives (from main HUD) ─── */\n  .frame{\n    position:relative;\n    background:\n      repeating-linear-gradient(90deg,\n        var(--wood) 0px, var(--wood) 22px,\n        var(--plank-shade) 22px, var(--plank-shade) 24px,\n        var(--wood-lt) 24px, var(--wood-lt) 25px,\n        var(--wood) 25px, var(--wood) 48px,\n        var(--plank-shade) 48px, var(--plank-shade) 50px),\n      linear-gradient(180deg, var(--wood-lt), var(--wood) 30%, var(--wood-dk));\n    border:3px solid var(--ink);\n    box-shadow:\n      inset 0 0 0 2px var(--wood-hi),\n      inset 0 0 0 4px var(--wood-dk),\n      inset 0 0 0 5px var(--ink),\n      0 4px 0 rgba(0,0,0,.6),\n      0 0 0 1px rgba(0,0,0,.5);\n    color:var(--parch);\n  }\n  .nail{position:absolute;width:10px;height:10px;border-radius:50%;\n    background:radial-gradient(circle at 35% 35%, #6a6660 0%, #2a2622 50%, #0a0806 100%);\n    box-shadow: inset 0 -1px 0 rgba(255,255,255,.15), 0 1px 0 rgba(0,0,0,.6);\n    z-index:3;pointer-events:none}\n  .nail.tl{top:6px;left:6px} .nail.tr{top:6px;right:6px}\n  .nail.bl{bottom:6px;left:6px} .nail.br{bottom:6px;right:6px}\n  .nail.sm{width:6px;height:6px}\n  .nail.sm.tl{top:4px;left:4px} .nail.sm.tr{top:4px;right:4px}\n  .nail.sm.bl{bottom:4px;left:4px} .nail.sm.br{bottom:4px;right:4px}\n  .nail.lg{width:14px;height:14px}\n  .nail.lg.tl{top:8px;left:8px} .nail.lg.tr{top:8px;right:8px}\n  .nail.lg.bl{bottom:8px;left:8px} .nail.lg.br{bottom:8px;right:8px}\n\n  .parch{\n    background:\n      radial-gradient(120% 80% at 30% 20%, rgba(255,255,255,.12), transparent 60%),\n      radial-gradient(80% 60% at 80% 90%, rgba(0,0,0,.18), transparent 60%),\n      linear-gradient(180deg, var(--parch) 0%, var(--parch-dk) 100%);\n    box-shadow: inset 0 0 0 1px var(--parch-shade), inset 0 0 0 2px var(--ink),\n                inset 0 0 12px rgba(80,40,10,.25);\n    color:var(--ink);\n  }\n\n  /* ─── BUTTONS ─── */\n  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;\n    font-family:'Press Start 2P';color:var(--ink);user-select:none;cursor:pointer;\n    background:var(--parch);\n    box-shadow:inset 0 0 0 1px var(--parch-shade), inset 0 0 0 2px var(--ink),\n               inset 0 -3px 0 rgba(0,0,0,.18), 0 2px 0 rgba(0,0,0,.5)}\n  .btn.alt{background:var(--oxblood);color:var(--parch);\n    box-shadow:inset 0 0 0 1px var(--oxblood-dk), inset 0 0 0 2px var(--ink),\n               inset 0 -3px 0 rgba(0,0,0,.35), 0 2px 0 rgba(0,0,0,.5)}\n  .btn.brass{background:linear-gradient(180deg, var(--brass-br) 0%, var(--brass) 40%, var(--brass-dk) 100%);\n    color:var(--ink);\n    box-shadow:inset 0 0 0 1px #ffe39a, inset 0 0 0 2px var(--brass-dk),\n               inset 0 0 0 3px var(--ink), inset 0 -3px 0 rgba(0,0,0,.3), 0 2px 0 rgba(0,0,0,.5)}\n  .btn.iron{background:linear-gradient(180deg, #4a4642 0%, #2a2622 60%, #0a0806 100%);color:var(--parch);\n    box-shadow:inset 0 0 0 1px #6a6660, inset 0 0 0 2px var(--ink),\n               inset 0 -3px 0 rgba(0,0,0,.4), 0 2px 0 rgba(0,0,0,.5)}\n  .btn.disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.5)}\n  .btn.hover{outline:2px solid var(--brass-br);outline-offset:2px}\n  .btn.pressed{box-shadow:inset 0 0 0 1px var(--parch-shade), inset 0 0 0 2px var(--ink),\n               inset 0 3px 0 rgba(0,0,0,.25);transform:translateY(2px)}\n\n  .btn-xs{padding:5px 8px;font-size:7px;min-height:22px;letter-spacing:.04em}\n  .btn-sm{padding:7px 12px;font-size:8px;min-height:30px;letter-spacing:.05em}\n  .btn-md{padding:10px 18px;font-size:10px;min-height:40px;letter-spacing:.06em}\n  .btn-lg{padding:14px 24px;font-size:12px;min-height:52px;letter-spacing:.08em}\n  .btn-xl{padding:18px 36px;font-size:14px;min-height:64px;letter-spacing:.1em}\n\n  /* icon button */\n  .ibtn{width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;\n    background:var(--wood-lt);color:var(--parch);font-family:'VT323';font-size:20px;cursor:pointer;\n    box-shadow:inset 0 0 0 1px var(--wood-hi), inset 0 0 0 2px var(--ink),\n               inset 0 -3px 0 rgba(0,0,0,.4), 0 2px 0 rgba(0,0,0,.5)}\n  .ibtn.sm{width:28px;height:28px;font-size:14px}\n  .ibtn.lg{width:56px;height:56px;font-size:28px}\n\n  /* ─── BANNER ─── */\n  .banner{position:relative;display:inline-block;\n    background:linear-gradient(180deg, var(--oxblood) 0%, var(--oxblood-dk) 100%);\n    box-shadow:inset 0 0 0 1px #b04030, inset 0 0 0 2px var(--ink),\n               inset 0 -2px 0 rgba(0,0,0,.35);\n    color:var(--parch);font-family:'Jacquard 12';\n    clip-path:polygon(0 0, 100% 0, 97% 50%, 100% 100%, 0 100%, 3% 50%);}\n  .banner.sm{padding:5px 24px 6px;font-size:16px}\n  .banner.md{padding:6px 36px 8px;font-size:22px}\n  .banner.lg{padding:9px 56px 11px;font-size:32px}\n\n  .scroll-ribbon{position:relative;display:inline-block;padding:8px 38px 10px;\n    background:var(--parch);color:var(--ink);font-family:'Jacquard 12';font-size:24px;\n    box-shadow:inset 0 0 0 1px var(--parch-shade), inset 0 0 0 2px var(--ink);\n    clip-path:polygon(8px 0, calc(100% - 8px) 0, 100% 50%, calc(100% - 8px) 100%, 8px 100%, 0% 50%);}\n\n  /* ─── WINDOWS ─── */\n  .window{position:relative;display:flex;flex-direction:column}\n  .window .titlebar{height:36px;display:flex;align-items:center;padding:0 14px;\n    background:linear-gradient(180deg, var(--oxblood) 0%, var(--oxblood-dk) 100%);\n    box-shadow:inset 0 0 0 1px #b04030, inset 0 0 0 2px var(--ink),\n               inset 0 -2px 0 rgba(0,0,0,.4);\n    color:var(--parch);font-family:'Jacquard 12';font-size:20px;letter-spacing:.02em;\n    position:relative;z-index:4}\n  .window .titlebar .close{margin-left:auto;width:20px;height:20px;display:inline-flex;\n    align-items:center;justify-content:center;background:var(--ink);color:var(--parch);\n    box-shadow:inset 0 0 0 1px var(--oxblood-dk), inset 0 0 0 2px var(--ink),\n               inset 0 0 0 3px #b04030;font-family:'Press Start 2P';font-size:8px;cursor:pointer}\n  .window .body{position:relative;padding:16px;color:var(--parch);\n    background:\n      repeating-linear-gradient(90deg,\n        var(--wood) 0px, var(--wood) 22px,\n        var(--plank-shade) 22px, var(--plank-shade) 24px,\n        var(--wood-lt) 24px, var(--wood-lt) 25px,\n        var(--wood) 25px, var(--wood) 48px,\n        var(--plank-shade) 48px, var(--plank-shade) 50px),\n      linear-gradient(180deg, var(--wood-lt), var(--wood) 30%, var(--wood-dk));\n    box-shadow:inset 0 0 0 1px var(--wood-hi), inset 0 0 0 2px var(--ink),\n               0 4px 0 rgba(0,0,0,.55), 0 0 0 1px rgba(0,0,0,.5)}\n  .window .body.parch{background:\n      radial-gradient(120% 80% at 30% 20%, rgba(255,255,255,.12), transparent 60%),\n      linear-gradient(180deg, var(--parch) 0%, var(--parch-dk) 100%);\n      color:var(--ink);\n      box-shadow:inset 0 0 0 1px var(--parch-shade), inset 0 0 0 2px var(--ink),\n                 inset 0 0 12px rgba(80,40,10,.25),\n                 0 4px 0 rgba(0,0,0,.55), 0 0 0 1px rgba(0,0,0,.5)}\n  .window .footer{padding:8px 14px;display:flex;justify-content:flex-end;gap:8px;\n    background:var(--wood-dk);\n    box-shadow:inset 0 0 0 1px var(--ink), inset 0 1px 0 rgba(0,0,0,.6)}\n\n  /* ─── DROPDOWN ─── */\n  .dd{position:relative;display:inline-block;font-family:'Pixelify Sans';color:var(--ink)}\n  .dd .trigger{display:flex;align-items:center;justify-content:space-between;gap:10px;\n    padding:9px 12px 9px 14px;background:var(--parch);min-width:200px;cursor:pointer;\n    box-shadow:inset 0 0 0 1px var(--parch-shade), inset 0 0 0 2px var(--ink),\n               inset 0 -2px 0 rgba(0,0,0,.15), 0 2px 0 rgba(0,0,0,.5);\n    font-size:16px}\n  .dd .trigger .chev{font-family:'VT323';font-size:18px;color:var(--ink);width:14px;text-align:center}\n  .dd .menu{position:absolute;left:0;top:calc(100% + 6px);min-width:100%;background:var(--ink);\n    box-shadow:inset 0 0 0 1px var(--brass-dk), inset 0 0 0 2px var(--ink), 0 4px 0 rgba(0,0,0,.6);\n    z-index:10;padding:4px}\n  .dd .menu .item{padding:8px 12px;font-size:15px;color:var(--parch);cursor:pointer;\n    font-family:'Pixelify Sans';display:flex;justify-content:space-between;align-items:center;gap:12px}\n  .dd .menu .item:hover{background:var(--wood-lt)}\n  .dd .menu .item.sel{background:var(--oxblood);color:var(--parch)}\n  .dd .menu .item .k{font-family:'Press Start 2P';font-size:7px;color:var(--brass-br)}\n  .dd .menu .sep{height:1px;background:var(--brass-dk);margin:4px 0}\n\n  /* ─── INPUT / FIELD ─── */\n  .field{display:inline-flex;align-items:center;gap:6px;padding:8px 10px;\n    background:var(--parch);color:var(--ink);font-family:'VT323';font-size:18px;\n    box-shadow:inset 0 1px 0 rgba(0,0,0,.25), inset 0 0 0 1px var(--parch-shade),\n               inset 0 0 0 2px var(--ink);min-width:200px}\n  .field .caret{display:inline-block;width:6px;height:14px;background:var(--ink);animation:blink 1s steps(1) infinite}\n  @keyframes blink{50%{opacity:0}}\n\n  /* ─── SCROLLBAR (custom pixel) ─── */\n  .scroll-demo{display:flex;gap:14px}\n  .scroll-track{width:18px;background:var(--wood-dk);\n    box-shadow:inset 0 0 0 1px var(--ink), inset 0 0 0 2px var(--brass-dk);\n    display:flex;flex-direction:column;align-items:center;justify-content:space-between}\n  .scroll-track .arrow{width:18px;height:18px;display:flex;align-items:center;justify-content:center;\n    background:var(--brass);color:var(--ink);font-family:'VT323';font-size:14px;cursor:pointer;\n    box-shadow:inset 0 0 0 1px #ffe49a, inset 0 0 0 2px var(--brass-dk)}\n  .scroll-track .thumb{width:14px;background:var(--brass);\n    box-shadow:inset 0 0 0 1px #ffe49a, inset 0 0 0 2px var(--brass-dk),\n               inset 0 -3px 0 rgba(0,0,0,.3)}\n  .scroll-content{padding:10px 14px;background:#241509;color:var(--parch);\n    box-shadow:inset 0 0 0 1px var(--brass-dk), inset 0 0 0 2px var(--ink);\n    font-family:'VT323';font-size:16px;line-height:1.3;overflow:hidden}\n\n  /* horizontal scrollbar */\n  .hscroll{height:18px;background:var(--wood-dk);position:relative;\n    box-shadow:inset 0 0 0 1px var(--ink), inset 0 0 0 2px var(--brass-dk)}\n  .hscroll .arrow{position:absolute;top:0;width:18px;height:18px;background:var(--brass);\n    color:var(--ink);font-family:'VT323';font-size:14px;display:flex;align-items:center;justify-content:center;\n    box-shadow:inset 0 0 0 1px #ffe49a, inset 0 0 0 2px var(--brass-dk)}\n  .hscroll .arrow.l{left:0} .hscroll .arrow.r{right:0}\n  .hscroll .thumb{position:absolute;top:2px;height:14px;background:var(--brass);\n    box-shadow:inset 0 0 0 1px #ffe49a, inset 0 0 0 2px var(--brass-dk),\n               inset 0 -3px 0 rgba(0,0,0,.3)}\n\n  /* ─── SLIDER ─── */\n  .slider{position:relative;height:14px;background:var(--ink);\n    box-shadow:inset 0 0 0 1px var(--brass-dk), inset 0 1px 0 rgba(0,0,0,.6)}\n  .slider .fill{height:100%;background:linear-gradient(180deg, var(--brass-br), var(--brass-dk));\n    box-shadow:inset 0 1px 0 rgba(255,255,255,.4)}\n  .slider .knob{position:absolute;top:-5px;width:14px;height:24px;background:var(--brass);\n    box-shadow:inset 0 0 0 1px #ffe49a, inset 0 0 0 2px var(--brass-dk),\n               inset 0 0 0 3px var(--ink), 0 2px 0 rgba(0,0,0,.5);\n    transform:translateX(-50%)}\n\n  /* ─── CHECKBOX / RADIO ─── */\n  .cbx{width:18px;height:18px;background:var(--parch);display:inline-flex;\n    align-items:center;justify-content:center;font-family:'VT323';font-size:18px;color:var(--ink);\n    box-shadow:inset 0 0 0 1px var(--parch-shade), inset 0 0 0 2px var(--ink)}\n  .cbx.lg{width:24px;height:24px;font-size:22px}\n  .rdo{width:18px;height:18px;background:var(--parch);border-radius:50%;display:inline-flex;\n    align-items:center;justify-content:center;\n    box-shadow:inset 0 0 0 1px var(--parch-shade), inset 0 0 0 2px var(--ink)}\n  .rdo .dot{width:8px;height:8px;background:var(--oxblood);border-radius:50%;\n    box-shadow:inset 0 0 0 1px var(--ink)}\n\n  /* ─── TABS ─── */\n  .tabs{display:flex;gap:2px;align-items:flex-end}\n  .tab{padding:8px 16px;background:var(--wood-dk);color:var(--parch-dk);cursor:pointer;\n    font-family:'Press Start 2P';font-size:8px;\n    box-shadow:inset 0 0 0 1px var(--ink), inset 0 0 0 2px var(--brass-dk),\n               inset 0 -2px 0 rgba(0,0,0,.4);\n    clip-path:polygon(6px 0, calc(100% - 6px) 0, 100% 100%, 0 100%)}\n  .tab.sel{background:var(--parch);color:var(--ink);transform:translateY(-2px);\n    box-shadow:inset 0 0 0 1px var(--parch-shade), inset 0 0 0 2px var(--ink)}\n\n  /* ─── BADGE / PIP ─── */\n  .badge{display:inline-flex;align-items:center;justify-content:center;\n    min-width:18px;height:18px;padding:0 5px;font-family:'Press Start 2P';font-size:8px;\n    background:var(--oxblood);color:var(--parch);\n    box-shadow:inset 0 0 0 1px var(--ink), 0 1px 0 rgba(0,0,0,.5)}\n  .badge.brass{background:linear-gradient(180deg,var(--brass-br),var(--brass-dk));color:var(--ink)}\n\n  /* ─── TOOLTIP ─── */\n  .tip-spec{position:relative;display:inline-block;background:var(--ink);color:var(--parch);\n    padding:6px 8px;font-family:'VT323';font-size:16px;line-height:1.15;\n    box-shadow:inset 0 0 0 1px var(--brass-dk), inset 0 0 0 2px var(--parch-shade),\n               0 4px 0 rgba(0,0,0,.6);white-space:nowrap}\n\n  /* ─── DIVIDER ─── */\n  .div-orn{display:flex;align-items:center;gap:8px;color:var(--brass-dk);font-family:'VT323';font-size:20px}\n  .div-orn::before,.div-orn::after{content:\"\";flex:1;height:2px;\n    background:linear-gradient(90deg, transparent, var(--brass-dk), var(--brass), var(--brass-dk), transparent)}\n\n  /* ─── GRID overlay for window specs ─── */\n  .grid-overlay{position:relative}\n  .grid-overlay::after{content:\"\";position:absolute;inset:0;pointer-events:none;\n    background:\n      repeating-linear-gradient(0deg, transparent 0 7px, rgba(95,179,255,.12) 7px 8px),\n      repeating-linear-gradient(90deg, transparent 0 7px, rgba(95,179,255,.12) 7px 8px)}\n\n  /* ─── token table ─── */\n  table.tokens{border-collapse:collapse;width:100%;font-family:'VT323';font-size:18px;color:var(--parch)}\n  table.tokens th,table.tokens td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--brass-dk)}\n  table.tokens th{font-family:'Press Start 2P';font-size:8px;color:var(--brass-br);letter-spacing:.08em;\n    background:rgba(0,0,0,.3)}\n  table.tokens td.k{color:var(--brass-br);font-family:'Press Start 2P';font-size:9px}\n  table.tokens td .swatch{display:inline-block;width:18px;height:18px;vertical-align:middle;margin-right:6px;\n    box-shadow:inset 0 0 0 1px rgba(0,0,0,.6), 0 0 0 1px rgba(232,213,164,.3)}\n  table.tokens td .px{display:inline-block;background:var(--ink);color:var(--brass-br);padding:0 5px;\n    font-family:'Press Start 2P';font-size:8px;margin-right:4px}\n\n  /* small caption */\n  .cap{font-family:'VT323';font-size:14px;color:var(--parch-dk)}\n\n  /* ─── 8-px grid ruler ─── */\n  .ruler{display:flex;gap:0;font-family:'Press Start 2P';font-size:7px;color:var(--brass-br);margin-bottom:6px}\n  .ruler span{flex:0 0 8px;height:14px;border-right:1px solid var(--brass-dk);display:flex;align-items:flex-end;justify-content:center}\n  .ruler span:nth-child(8n){border-right-color:var(--parch);position:relative}\n  .ruler span:nth-child(8n)::after{content:attr(data-n);position:absolute;bottom:14px;font-size:7px;color:var(--parch-dk)}\n\n  /* ─── HUD stack preview (mini) ─── */\n  .stack-frame{padding:14px;background:#1a1108;\n    box-shadow:inset 0 0 0 1px var(--brass-dk), inset 0 0 0 2px var(--ink)}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"wrap\">\n\n  <!-- ─── HEADER ─── -->\n  <header class=\"hd-banner\">\n    <div class=\"super\">GUILDS OF THE CROWN · UI &amp; HUD SIZING SPEC<\u002Fdiv>\n    <h1>UI Kit · v1.0<\u002Fh1>\n    <div class=\"sub\">Designed at 1× pixel scale · Press Start 2P · Pixelify Sans · Jacquard 12 · VT323<\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ─── 01 GRID & TOKENS ─── -->\n  <section>\n    <div class=\"shead\">\n      <span class=\"num\">01<\u002Fspan><h2>Grid &amp; Tokens<\u002Fh2>\n      <span class=\"desc\">all sizes snap to an 8-pixel base grid<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"row\" style=\"align-items:flex-start;gap:64px\">\n      <div>\n        <div class=\"lbl cap\" style=\"margin-bottom:6px;color:var(--brass-br);font-family:'Press Start 2P';font-size:8px\">BASE UNIT · 8 px<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(8, 8px);grid-template-rows:repeat(4, 8px);\n                    background:linear-gradient(90deg, var(--brass) 1px, transparent 1px) 0 0/8px 8px,\n                               linear-gradient(0deg, var(--brass) 1px, transparent 1px) 0 0/8px 8px,\n                               var(--wood-dk);\n                    width:64px;height:32px;box-shadow:inset 0 0 0 1px var(--ink)\"><\u002Fdiv>\n        <div class=\"cap\" style=\"margin-top:6px\">Scale: <em style=\"color:var(--parch)\">4, 8, 12, 16, 24, 32, 40, 48, 56, 64<\u002Fem><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex:1;min-width:480px\">\n        <table class=\"tokens\">\n          <thead>\n            <tr><th>Token<\u002Fth><th>Value<\u002Fth><th>Use<\u002Fth><\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr><td class=\"k\">--ink<\u002Ftd><td><span class=\"swatch\" style=\"background:#1a0e04\"><\u002Fspan>#1A0E04<\u002Ftd><td>outlines, type on parchment<\u002Ftd><\u002Ftr>\n            <tr><td class=\"k\">--wood<\u002Ftd><td><span class=\"swatch\" style=\"background:#3a2618\"><\u002Fspan>#3A2618<\u002Ftd><td>panel plank fill<\u002Ftd><\u002Ftr>\n            <tr><td class=\"k\">--wood-lt<\u002Ftd><td><span class=\"swatch\" style=\"background:#5a3a22\"><\u002Fspan>#5A3A22<\u002Ftd><td>plank highlight<\u002Ftd><\u002Ftr>\n            <tr><td class=\"k\">--parch<\u002Ftd><td><span class=\"swatch\" style=\"background:#e8d5a4\"><\u002Fspan>#E8D5A4<\u002Ftd><td>inset surface, primary buttons<\u002Ftd><\u002Ftr>\n            <tr><td class=\"k\">--brass<\u002Ftd><td><span class=\"swatch\" style=\"background:#c9a35a\"><\u002Fspan>#C9A35A<\u002Ftd><td>borders, coin, accents<\u002Ftd><\u002Ftr>\n            <tr><td class=\"k\">--brass-br<\u002Ftd><td><span class=\"swatch\" style=\"background:#f0d27a\"><\u002Fspan>#F0D27A<\u002Ftd><td>highlights, hover ring<\u002Ftd><\u002Ftr>\n            <tr><td class=\"k\">--oxblood<\u002Ftd><td><span class=\"swatch\" style=\"background:#7a2a1e\"><\u002Fspan>#7A2A1E<\u002Ftd><td>destructive/primary banner<\u002Ftd><\u002Ftr>\n            <tr><td class=\"k\">--iron<\u002Ftd><td><span class=\"swatch\" style=\"background:#1c1a18\"><\u002Fspan>#1C1A18<\u002Ftd><td>nails, deep shadows<\u002Ftd><\u002Ftr>\n            <tr><td class=\"k\">border<\u002Ftd><td><span class=\"px\">3px<\u002Fspan> outer ink + <span class=\"px\">2px<\u002Fspan>
